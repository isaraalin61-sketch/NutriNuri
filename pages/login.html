<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../bootstrap-5.3.8-dist/css/bootstrap.min.css">  
    <link rel="stylesheet" href="../styles/style.css">
    <title>Login - NutriNuri</title>
    <link rel="icon" type="image/svg+xml" href="../../images/fontawesom/otter-solid-full.svg">
</head>
<body class="d-flex justify-content-center min-vh-100">
  
    <div class="login-container col-11 col-sm-8 col-md-5 col-lg-4 col-xl-3">
        <!-- Logo de la Nutria (coherencia con tu favicon) -->
        <div class="text-center mb-4">
            <div class="rounded-circle bg-white d-inline-flex p-3 shadow-sm border border-4" style="border-color: #EBD7C5 !important;">
                <img src="../../images/fontawesom/otter-solid-full.svg" alt="Logo" width="50" height="50">
            </div>
            <h2 class="mt-3 fw-bold" style="color: #744c38;">¡Bienvenido!</h2>
            <p class="text-muted small"></p>
        </div>


        <div class="auth-card">
            <div class="text-center mb-4">
                <h2 class="auth-title">Iniciar Sesión</h2>
            </div>

            <form id="loginForm">
                <div class="mb-3">
                    <label class="form-label small fw-bold" style="color: #744c38;">CORREO</label>
                    <input id="correo" type="email" class="form-control" placeholder="tu@email.com">
                    <span class="error" id="errorCorreo"></span>
                </div>
                <div class="mb-4">
                    <label class="form-label small fw-bold" style="color: #744c38;">CONTRASEÑA</label>
                    <input id="contrasena" type="password" class="form-control" placeholder="*********">
    
                    <div class="text-end mt-1">
                        <a href="./recuperar_password.html" class="text-decoration-none" style="color: #D9A066; font-size: 0.75rem;">
                            ¿Olvidaste tu contraseña?
                        </a>
                    </div>
    
                    <span class="error" id="errorContrasena" style="color: #dc3545; font-size: 0.8rem;"></span>
                </div>
                <button class="btn-auth w-100 shadow-sm">INGRESAR</button>
            </form>
        </div>

        
        <div class="text-center mt-4">
            <p class="small" style="color: #744c38;">¿No tienes cuenta? 
                <a href="./registro.html" class="fw-bold text-decoration-none" style="color: #D9A066;">Regístrate aquí</a>
            </p>
        </div>
    </div>


    <script>
        const form = document.getElementById("loginForm");

        form.addEventListener("submit", function(e) {
        e.preventDefault();

        const correo = document.getElementById("correo");
        const contrasena = document.getElementById("contrasena");

        const errorCorreo = document.getElementById("errorCorreo");
        const errorContrasena = document.getElementById("errorContrasena");

        // Limpiar errores
        errorCorreo.textContent = "";
        errorContrasena.textContent = "";

        let valido = true;

        // Validar correo
        if (!correo.value) {
          errorCorreo.textContent = "El correo es obligatorio";
          valido = false;
         } else if (!correo.checkValidity()) {
         errorCorreo.textContent = "Ingresa un correo válido";
         valido = false;
         }

        // Validar contraseña
        if (!contrasena.value) {
          errorContrasena.textContent = "La contraseña es obligatoria";
          valido = false;
        }

         if (!valido) return;

          // Simulación login
        if (correo.value === "nutriologo@imss.gob.mx" && contrasena.value === "1234") {
          window.location.href = "./nutritionist/dashboard_nutriologo.html";
         } 
         else if (correo.value === "maria@gmail.com" && contrasena.value === "1234") {
           window.location.href = "./paciente/home.html";
         } 
         else {
           errorContrasena.textContent = "Correo o contraseña incorrectos";
         }
        });
    </script>

<script src="../../bootstrap-5.3.8-dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
